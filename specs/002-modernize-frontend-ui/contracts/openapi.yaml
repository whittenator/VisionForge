openapi: 3.0.3
info:
  title: VisionForge Auth API (Subset)
  version: 0.1.0
paths:
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      displayName:
                        type: string
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Logout current session
      responses:
        '204':
          description: Logged out
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
